<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Примерка Картины PRO</title>
    
    <script src="https://unpkg.com/webxr-polyfill@latest/build/webxr-polyfill.js"></script>
    <script>var polyfill = new WebXRPolyfill();</script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        :root {
            --primary: #0071e3;
            --surface: rgba(255, 255, 255, 0.85);
            --text: #1d1d1f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            width: 100vw; height: 100vh;
            overflow: hidden; background: #000;
        }

        /* Основной контейнер 3D */
        model-viewer {
            width: 100%; height: 100%;
            display: block; background: #e5e5ea;
        }

        /* --- UI ПОВЕРХ 3D (ВНЕ AR) --- */
        .web-ui {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: #fff;
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .web-ui.hidden { transform: translateY(100%); }

        .controls-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;
        }

        .input-group {
            background: #f5f5f7; border-radius: 12px; padding: 10px 14px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .input-group label { font-size: 13px; color: #86868b; }
        .input-group input {
            width: 50px; background: transparent; border: none; text-align: right;
            font-size: 16px; font-weight: 600; outline: none;
        }

        .btn-main {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            background: var(--primary); color: #fff; font-size: 16px; font-weight: 600;
            cursor: pointer; margin-bottom: 10px;
        }
        .btn-sec {
            width: 100%; padding: 14px; border-radius: 14px; border: 1px solid #d2d2d7;
            background: #fff; color: var(--text); font-size: 15px; font-weight: 500;
        }

        /* --- UI ВНУТРИ AR (Режим камеры) --- */
        #ar-ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
        }

        .ar-toast {
            align-self: center; margin-top: 20px;
            background: rgba(0,0,0,0.7); color: #fff;
            padding: 12px 24px; border-radius: 30px; font-size: 14px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: opacity 0.3s;
        }

        .ar-controls {
            display: flex; gap: 10px; margin-bottom: 20px;
            pointer-events: auto; /* Делаем кнопки кликабельными */
        }

        .ar-btn {
            flex: 1; padding: 16px 10px; border-radius: 16px; border: none;
            background: var(--surface); color: var(--text);
            font-size: 14px; font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        .ar-btn.primary { background: var(--primary); color: #fff; }
        .ar-btn.danger { background: rgba(255,59,48,0.9); color: #fff; }

        /* Щит перехвата свайпов */
        #touch-shield {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
        }
        #touch-shield.locked { pointer-events: auto; }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer" 
        src="https://cdn.jsdelivr.net/gh/danierukoruzunikanko-dev/3d-models@main/uploads_files_4943730_lisa.glb" 
        ar ar-modes="webxr scene-viewer quick-look"
        ar-scale="fixed" ar-placement="wall"
        camera-controls disable-zoom shadow-intensity="1.2">
        
        <div slot="ar-ui" id="ar-ui-container">
            <div id="touch-shield"></div>
            
            <div class="ar-toast" id="ar-toast">Наведите на стену</div>

            <div class="ar-controls">
                <button class="ar-btn" id="btn-recenter">Переместить</button>
                <button class="ar-btn primary" id="btn-lock">Закрепить</button>
                <button class="ar-btn danger" id="btn-exit">X</button>
            </div>
        </div>
    </model-viewer>

    <div class="web-ui" id="web-ui">
        <div class="controls-grid">
            <div class="input-group">
                <label>Ширина</label>
                <div><input type="number" id="w-val" value="60"> см</div>
            </div>
            <div class="input-group">
                <label>Высота</label>
                <div><input type="number" id="h-val" value="80"> см</div>
            </div>
        </div>

        <input type="file" id="img-upload" accept="image/*" style="display: none;">
        
        <button class="btn-main" id="btn-start-ar">Примерить в AR</button>
        <button class="btn-sec" onclick="document.getElementById('img-upload').click()">Загрузить свою картину</button>
    </div>

    <script>
        const viewer = document.getElementById('viewer');
        const wInput = document.getElementById('w-val');
        const hInput = document.getElementById('h-val');
        const toast = document.getElementById('ar-toast');
        const touchShield = document.getElementById('touch-shield');
        const btnLock = document.getElementById('btn-lock');

        let isLocked = false;
        let imgAspectRatio = 60 / 80; // По умолчанию пропорции Моны Лизы

        // 1. Применение правильного масштаба (в метрах)
        function updateScale() {
            const w = parseFloat(wInput.value) || 60;
            const h = parseFloat(hInput.value) || 80;
            viewer.setAttribute('scale', `${w / 100} ${h / 100} 1`);
        }

        wInput.addEventListener('input', () => {
            // Если меняем ширину, авто-подгоняем высоту для сохранения пропорций
            hInput.value = Math.round(wInput.value / imgAspectRatio);
            updateScale();
        });
        
        hInput.addEventListener('input', () => {
            // Если меняем высоту, авто-подгоняем ширину
            wInput.value = Math.round(hInput.value * imgAspectRatio);
            updateScale();
        });

        // 2. Умная загрузка фото с расчетом пропорций
        document.getElementById('img-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            
            // Вычисляем пропорции изображения
            const img = new Image();
            img.src = url;
            img.onload = async () => {
                imgAspectRatio = img.width / img.height;
                // Подгоняем высоту под текущую ширину
                hInput.value = Math.round(wInput.value / imgAspectRatio);
                updateScale();

                // Натягиваем текстуру на 3D модель
                try {
                    const texture = await viewer.createTexture(url);
                    if (viewer.model?.materials[0]?.pbrMetallicRoughness?.baseColorTexture) {
                        viewer.model.materials[0].pbrMetallicRoughness.baseColorTexture.setTexture(texture);
                    }
                } catch(err) { console.error(err); }
            };
        });

        // 3. Запуск AR
        document.getElementById('btn-start-ar').addEventListener('click', () => {
            updateScale();
            viewer.activateAR();
        });

        // 4. Логика работы AR (Отлипание от стены и центровка)
        viewer.addEventListener('ar-status', (e) => {
            if(e.detail.status === 'session-started') {
                document.getElementById('web-ui').classList.add('hidden');
                toast.innerText = "Ищите ровную стену...";
            }
        });

        // Фиксация на месте
        btnLock.addEventListener('click', () => {
            isLocked = !isLocked;
            if (isLocked) {
                touchShield.classList.add('locked');
                btnLock.innerText = "Открепить";
                btnLock.classList.remove('primary');
                toast.innerText = "Картина зафиксирована";
            } else {
                touchShield.classList.remove('locked');
                btnLock.innerText = "Закрепить";
                btnLock.classList.add('primary');
                toast.innerText = "Можно двигать пальцем";
            }
            setTimeout(() => toast.style.opacity = '0', 2000);
            toast.style.opacity = '1';
        });

        // Принудительное "отлипание" от старой стены и поиск новой
        document.getElementById('btn-recenter').addEventListener('click', () => {
            if (isLocked) btnLock.click(); // Снимаем блокировку
            
            toast.style.opacity = '1';
            toast.innerText = "Наведите центр экрана на новую стену";
            
            // МАГИЯ: Убираем привязку к стене и возвращаем ее через долю секунды.
            // Это сбрасывает старый якорь, и прицел появляется по центру экрана телефона!
            viewer.removeAttribute('ar-placement');
            setTimeout(() => { 
                viewer.setAttribute('ar-placement', 'wall'); 
            }, 100);
        });

        // Выход
        document.getElementById('btn-exit').addEventListener('click', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
