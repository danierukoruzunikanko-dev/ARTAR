<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Примерка - Фикс WebXR</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        :root {
            --primary: #0071e3;
            --bg: #000;
            --surface: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: var(--bg); }
        .app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

        .viewport-container { flex: 1; position: relative; background: #e5e5ea; }
        model-viewer { width: 100%; height: 100%; display: block; }

        /* Панель настроек (ВНЕ AR) */
        .bottom-ui {
            background: var(--surface); padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
            border-radius: 24px 24px 0 0; z-index: 10;
        }
        .inputs-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .input-box {
            background: #f5f5f7; border-radius: 12px; padding: 12px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .input-box label { font-size: 13px; color: #86868b; }
        .input-box input { width: 60px; border: none; background: transparent; text-align: right; font-size: 16px; font-weight: 600; outline: none; }
        
        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-secondary { background: #fff; color: #1d1d1f; border: 1px solid #d2d2d7; }

        /* ИНТЕРФЕЙС В РЕЖИМЕ КАМЕРЫ (AR) */
        .ar-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: env(safe-area-inset-top) 20px calc(15px + env(safe-area-inset-bottom)) 20px;
        }
        .ar-status-toast { align-self: center; margin-top: 15px; background: rgba(0, 0, 0, 0.75); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; backdrop-filter: blur(10px); }
        .ar-action-bar { display: flex; gap: 10px; pointer-events: auto; }
        .ar-btn { flex: 1; padding: 16px; border-radius: 14px; border: none; font-size: 14px; font-weight: 600; color: #1d1d1f; background: rgba(255, 255, 255, 0.9); }
        .ar-btn.confirm { background: var(--primary); color: #fff; }
        .ar-btn.close { background: #ff3b30; color: #fff; flex: 0 0 60px; }

        .error-toast { position: absolute; top: 20px; left: 20px; right: 20px; background: #ff3b30; color: white; padding: 16px; border-radius: 12px; font-size: 14px; text-align: center; display: none; z-index: 50; }
    </style>
</head>
<body>
    <div class="app">
        <div class="viewport-container">
            <div class="error-toast" id="error-msg">Твой браузер не поддерживает WebXR. Открой ссылку в Google Chrome.</div>

            <model-viewer 
                id="art-engine" 
                src="https://cdn.jsdelivr.net/gh/danierukoruzunikanko-dev/3d-models@main/uploads_files_4943730_lisa.glb" 
                ar 
                ar-modes="webxr" 
                ar-scale="fixed" 
                ar-placement="wall"
                camera-controls 
                disable-zoom>
                
                <div slot="ar-ui" class="ar-overlay">
                    <div class="ar-status-toast" id="ar-toast">Наведите на стену</div>
                    <div class="ar-action-bar">
                        <button class="ar-btn" id="ar-relocate">Новая стена</button>
                        <button class="ar-btn confirm" id="ar-freeze">Закрепить</button>
                        <button class="ar-btn close" id="ar-quit">✕</button>
                    </div>
                </div>
            </model-viewer>
        </div>

        <div class="bottom-ui">
            <div class="inputs-row">
                <div class="input-box"><label>Ширина</label><div><input type="number" id="w-in" value="60"> см</div></div>
                <div class="input-box"><label>Высота</label><div><input type="number" id="h-in" value="80"> см</div></div>
            </div>
            <input type="file" id="file-in" accept="image/*" style="display: none;">
            <button class="btn btn-primary" id="start-ar">Примерить на стену (AR)</button>
            <button class="btn btn-secondary" onclick="document.getElementById('file-in').click()">Своя картина</button>
        </div>
    </div>

    <script>
        const viewer = document.getElementById('art-engine');
        const wIn = document.getElementById('w-in');
        const hIn = document.getElementById('h-in');
        const toast = document.getElementById('ar-toast');
        let locked = false;

        // Прямое и тупое масштабирование (1 метр = 1)
        function applyScale() {
            const w = (parseFloat(wIn.value) || 60) / 100;
            const h = (parseFloat(hIn.value) || 80) / 100;
            viewer.setAttribute('scale', `${w} ${h} 1`);
        }

        wIn.addEventListener('input', applyScale);
        hIn.addEventListener('input', applyScale);
        viewer.addEventListener('load', applyScale);

        // Загрузка своей картинки
        document.getElementById('file-in').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            
            const img = new Image();
            img.src = url;
            img.onload = async () => {
                const aspect = img.width / img.height;
                hIn.value = Math.round(wIn.value / aspect);
                applyScale();

                try {
                    const texture = await viewer.createTexture(url);
                    if (viewer.model?.materials[0]?.pbrMetallicRoughness?.baseColorTexture) {
                        viewer.model.materials[0].pbrMetallicRoughness.baseColorTexture.setTexture(texture);
                    }
                } catch(err) {}
            };
        });

        // Запуск AR
        document.getElementById('start-ar').addEventListener('click', () => {
            if (!viewer.canActivateAR) {
                document.getElementById('error-msg').style.display = 'block';
                return;
            }
            applyScale();
            viewer.activateAR();
        });

        // AR Кнопки
        document.getElementById('ar-freeze').addEventListener('click', (e) => {
            e.stopPropagation();
            locked = !locked;
            if(locked) {
                document.getElementById('ar-freeze').innerText = "Разблокировать";
                document.getElementById('ar-freeze').style.background = "#86868b";
                toast.innerText = "Закреплено";
            } else {
                document.getElementById('ar-freeze').innerText = "Закрепить";
                document.getElementById('ar-freeze').style.background = "var(--primary)";
                toast.innerText = "Можно двигать";
            }
        });

        document.getElementById('ar-relocate').addEventListener('click', (e) => {
            e.stopPropagation();
            if(locked) document.getElementById('ar-freeze').click();
            toast.innerText = "Наведите на новую стену";
            viewer.removeAttribute('ar-placement');
            setTimeout(() => viewer.setAttribute('ar-placement', 'wall'), 50);
        });

        document.getElementById('ar-quit').addEventListener('click', () => window.location.reload());
    </script>
</body>
</html>
